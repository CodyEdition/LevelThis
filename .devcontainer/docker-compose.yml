version: '3.8'

services:
  vencord-dev:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
      - vencord-node-modules:/workspace/node_modules
      - vencord-pnpm-store:/root/.local/share/pnpm/store
    command: sleep infinity
    environment:
      - NODE_ENV=development
    working_dir: /workspace

volumes:
  vencord-node-modules:
  vencord-pnpm-store:
